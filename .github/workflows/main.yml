name: Deploy Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Создаём admin-gate.config.js
        run: |
          echo "window.ADMIN_GATE = { password: '${{ secrets.ADMIN_PASSWORD }}' };" > admin-gate.config.js

      - name: Загружаем артефакт
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Деплой
        uses: actions/deploy-pages@v4
